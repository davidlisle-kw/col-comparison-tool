<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost of Living Comparison Tool</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="agents.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1b2a; }
    input::placeholder, textarea::placeholder { color: rgba(122,147,168,0.4); }
    select option { background: #1b2e40; color: #f0ece0; }
    button { transition: all .17s; }
    button:not(:disabled):hover { filter: brightness(1.1); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ═══════════════════════════════════════════════════
//  EMAILJS CONFIGURATION
//  Get these from dashboard.emailjs.com
// ═══════════════════════════════════════════════════
const EMAILJS_SERVICE_ID  = "service_sksk2pd";
const EMAILJS_TEMPLATE_ID = "template_xzbum5o";
const EMAILJS_PUBLIC_KEY  = "ti6eB0kDw2fZit1_i";
// ═══════════════════════════════════════════════════
//  AGENTS are loaded from agents.js — edit that file
//  to add or remove agents without touching this file
// ═══════════════════════════════════════════════════

const API_URL    = "/api/compare";
const EMAILJS_SDK = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";

const CATEGORIES = [
  { key: "housing",        label: "Housing",           icon: "🏠" },
  { key: "groceries",      label: "Groceries",         icon: "🛒" },
  { key: "utilities",      label: "Utilities",         icon: "⚡" },
  { key: "transportation", label: "Transportation",    icon: "🚗" },
  { key: "healthcare",     label: "Healthcare",        icon: "🏥" },
  { key: "dining",         label: "Dining Out",        icon: "🍽️" },
  { key: "taxes",          label: "State & Local Tax", icon: "📋" },
  { key: "childcare",      label: "Childcare",         icon: "👶" },
];

const TIMELINE_OPTIONS = ["ASAP (0–3 months)", "3–6 months", "6–12 months", "Just exploring"];
const BUYER_STATUS     = ["First-time buyer", "Repeat buyer", "Selling & buying", "Renting first", "Investor"];
const CONTACT_PREFS    = ["Email", "Phone call", "Text message", "Video call"];
const HVAC_OPTIONS     = ["Central A/C & Heat", "Heat pump", "Gas forced air", "Radiant/baseboard", "Mini-split", "No preference"];

const gold    = "#d4a017";
const goldBar = { background:"linear-gradient(90deg,#996515,#d4a017,#c8960c,#d4a017,#996515)", height:"4px" };
const inp     = { width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:"9px", padding:"11px 13px", color:"#f0ece0", fontSize:"13px", fontFamily:"sans-serif", outline:"none", boxSizing:"border-box" };
const lbl     = { display:"block", color:"#7a93a8", fontSize:"10px", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"6px", fontFamily:"sans-serif" };
const card    = { background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.09)", borderRadius:"14px", padding:"24px", marginBottom:"18px" };
const secHead = { color:gold, fontFamily:"sans-serif", fontSize:"10px", letterSpacing:"2.5px", textTransform:"uppercase", marginBottom:"14px", paddingBottom:"8px", borderBottom:"1px solid rgba(212,160,23,0.15)" };

function loadEmailJS() {
  return new Promise((resolve, reject) => {
    if (window.emailjs) { resolve(); return; }
    const s = document.createElement("script");
    s.src = EMAILJS_SDK; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function buildEmailHTML(lead, agent, result) {
  const pct = Math.round(((result.totalToMonthly - result.totalFromMonthly) / result.totalFromMonthly) * 100);
  const pctColor = pct > 0 ? "#ff6b6b" : "#4ade80";
  const catRows = CATEGORIES.map((cat, i) => {
    const d = result.categories[cat.key]; if (!d) return "";
    const cp = Math.round(((d.toMonthly - d.fromMonthly) / d.fromMonthly) * 100);
    return `<tr style="background:${i%2?"rgba(255,255,255,0.02)":"transparent"}">
      <td style="padding:6px 10px;color:#7a93a8;font-family:sans-serif;font-size:11px">${cat.icon} ${cat.label}</td>
      <td style="padding:6px 10px;color:#c0b48a;font-family:sans-serif;font-size:11px;text-align:center">$${d.fromMonthly}/mo</td>
      <td style="padding:6px 10px;color:#f0ece0;font-family:sans-serif;font-size:11px;text-align:center">$${d.toMonthly}/mo</td>
      <td style="padding:6px 10px;color:${cp>0?"#ff6b6b":"#4ade80"};font-family:sans-serif;font-size:11px;text-align:center;font-weight:700">${cp>0?"+":""}${cp}%</td>
    </tr>`;
  }).join("");

  const r = (label, value, alt) => `<tr style="background:${alt?"rgba(255,255,255,0.02)":"transparent"}">
    <td style="padding:7px 12px;color:#7a93a8;font-family:sans-serif;font-size:11px;width:38%">${label}</td>
    <td style="padding:7px 12px;color:#f0ece0;font-family:sans-serif;font-size:12px">${value||"<span style='color:#3a5060'>Not specified</span>"}</td>
  </tr>`;

  const sec = (title, rows) => `<div style="margin-bottom:20px">
    <div style="background:rgba(255,255,255,0.04);padding:7px 12px;color:#7a93a8;font-family:sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase">${title}</div>
    <table style="width:100%;border-collapse:collapse;border:1px solid rgba(255,255,255,0.06);border-top:none">${rows}</table>
  </div>`;

  return `<!DOCTYPE html><html><body style="margin:0;padding:0;background:#0d1b2a;font-family:Georgia,serif;color:#f0ece0">
<div style="max-width:640px;margin:0 auto">
  <div style="background:linear-gradient(90deg,#996515,#d4a017,#c8960c,#d4a017,#996515);height:4px"></div>
  <div style="padding:28px 32px">
    <div style="background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);border-radius:4px;display:inline-block;padding:4px 14px;margin-bottom:14px">
      <span style="color:#d4a017;font-size:9px;letter-spacing:3px;font-family:sans-serif;text-transform:uppercase">New Relocation Lead</span>
    </div>
    <h1 style="font-size:22px;font-weight:400;color:#f0ece0;margin:0 0 4px;font-family:Georgia,serif">${lead.firstName} ${lead.lastName} wants to move to ${result.to.city}</h1>
    <p style="color:#7a93a8;font-family:sans-serif;font-size:12px;margin:0 0 24px">Assigned to: <strong style="color:#d4a017">${agent.name}</strong> · ${agent.title}</p>
    ${sec("Contact Information",
      r("Name", `<strong>${lead.firstName} ${lead.lastName}</strong>`, false) +
      r("Email", `<a href="mailto:${lead.email}" style="color:#d4a017">${lead.email}</a>`, true) +
      r("Phone", lead.phone, false) +
      r("Contact preference", lead.contactPref, true)
    )}
    ${sec("Move Details",
      r("Moving from", `${result.from.city}, ${result.from.state} (${result.from.zip})`, false) +
      r("Moving to", `${result.to.city}, ${result.to.state} (${result.to.zip})`, true) +
      r("Timeline", lead.timeline, false) +
      r("Buyer profile", lead.buyerStatus, true) +
      r("Pre-approved?", lead.preApproved, false) +
      r("Price range", lead.priceRange, true)
    )}
    ${sec("Home Preferences",
      r("Bedrooms", lead.bedrooms, false) +
      r("Bathrooms", lead.bathrooms, true) +
      r("Garage", lead.garage, false) +
      r("HVAC / Heating", lead.hvac, true) +
      r("Pool", lead.pool, false) +
      r("Basement", lead.basement, true)
    )}
    <div style="background:rgba(${pct>0?"200,60,60":"40,180,80"},0.08);border:1px solid rgba(${pct>0?"200,60,60":"40,180,80"},0.2);border-radius:10px;padding:16px;margin-bottom:20px;text-align:center">
      <div style="color:#7a93a8;font-family:sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">${result.from.city} → ${result.to.city} Cost of Living</div>
      <div style="font-size:40px;font-weight:300;color:${pctColor};line-height:1;margin-bottom:4px">${pct>0?"+":""}${pct}%</div>
      <div style="color:#c0b48a;font-family:sans-serif;font-size:12px">$${result.totalFromMonthly.toLocaleString()}/mo → $${result.totalToMonthly.toLocaleString()}/mo</div>
    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
      <tr style="background:rgba(255,255,255,0.06)">
        <th style="padding:7px 10px;color:#7a93a8;font-family:sans-serif;font-size:9px;text-transform:uppercase;text-align:left">Category</th>
        <th style="padding:7px 10px;color:#7a93a8;font-family:sans-serif;font-size:9px;text-transform:uppercase;text-align:center">Current</th>
        <th style="padding:7px 10px;color:#7a93a8;font-family:sans-serif;font-size:9px;text-transform:uppercase;text-align:center">Destination</th>
        <th style="padding:7px 10px;color:#7a93a8;font-family:sans-serif;font-size:9px;text-transform:uppercase;text-align:center">Change</th>
      </tr>
      ${catRows}
    </table>
    ${lead.notes ? `<div style="background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.16);border-radius:8px;padding:13px 15px;margin-bottom:20px"><div style="color:#d4a017;font-family:sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">Client Notes</div><p style="color:#b8a878;font-family:sans-serif;font-size:12px;line-height:1.65;margin:0">${lead.notes}</p></div>` : ""}
    <p style="color:#2a3f50;font-family:sans-serif;font-size:10px;line-height:1.6;border-top:1px solid #1a2d3a;padding-top:14px">Submitted via Cost of Living Comparison Tool · Powered by Claude (Anthropic)</p>
  </div>
  <div style="background:linear-gradient(90deg,#996515,#d4a017,#c8960c,#d4a017,#996515);height:4px"></div>
</div></body></html>`;
}

const Pill = ({ label, active, onClick }) => (
  <button onClick={onClick} style={{ padding:"6px 13px", borderRadius:"20px", fontSize:"11px", fontFamily:"sans-serif", cursor:"pointer", background:active?gold:"rgba(255,255,255,0.05)", border:`1px solid ${active?gold:"rgba(255,255,255,0.1)"}`, color:active?"#0d1b2a":"#7a93a8", fontWeight:active?700:400 }}>{label}</button>
);

const Sel = ({ value, onChange, options, placeholder }) => (
  <select style={{...inp, appearance:"none"}} value={value} onChange={e => onChange(e.target.value)}>
    <option value="">{placeholder || "— Select —"}</option>
    {options.map(o => <option key={o} value={o}>{o}</option>)}
  </select>
);

function App() {
  const { useState } = React;

  const [fromZip, setFromZip]     = useState("");
  const [toZip, setToZip]         = useState("");
  const [income, setIncome]       = useState("");
  const [loading, setLoading]     = useState(false);
  const [result, setResult]       = useState(null);
  const [compError, setCompError] = useState("");
  const [showForm, setShowForm]   = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [formError, setFormError] = useState("");
  const [sending, setSending]     = useState(false);
  const [lead, setLead] = useState({
    firstName:"", lastName:"", email:"", phone:"",
    agentIndex:"", timeline:"", buyerStatus:"", contactPref:"",
    preApproved:"", priceRange:"",
    bedrooms:"", bathrooms:"", garage:"", hvac:"", pool:"", basement:"",
    notes:"", consent:false,
  });
  const setL = (k, v) => setLead(p => ({...p, [k]: v}));

  const fetchComparison = async () => {
    if (fromZip.length !== 5 || toZip.length !== 5) { setCompError("Please enter valid 5-digit ZIP codes."); return; }
    setCompError(""); setLoading(true); setResult(null); setShowForm(false); setSubmitted(false);
    const incomeNote = income ? `The user earns $${parseInt(income).toLocaleString()} annually.` : "";
    const prompt = `You are a cost of living data expert. Compare cost of living between ZIP code ${fromZip} and ZIP code ${toZip}. ${incomeNote}\nReturn ONLY valid JSON, no markdown:\n{"from":{"zip":"${fromZip}","city":"city","state":"XX","overallIndex":100},"to":{"zip":"${toZip}","city":"city","state":"XX","overallIndex":100},"categories":{"housing":{"fromIndex":100,"toIndex":100,"fromMonthly":1200,"toMonthly":1200},"groceries":{"fromIndex":100,"toIndex":100,"fromMonthly":400,"toMonthly":400},"utilities":{"fromIndex":100,"toIndex":100,"fromMonthly":150,"toMonthly":150},"transportation":{"fromIndex":100,"toIndex":100,"fromMonthly":300,"toMonthly":300},"healthcare":{"fromIndex":100,"toIndex":100,"fromMonthly":250,"toMonthly":250},"dining":{"fromIndex":100,"toIndex":100,"fromMonthly":300,"toMonthly":300},"taxes":{"fromIndex":100,"toIndex":100,"fromMonthly":500,"toMonthly":500},"childcare":{"fromIndex":100,"toIndex":100,"fromMonthly":800,"toMonthly":800}},"summary":"2-3 sentence summary","totalFromMonthly":3900,"totalToMonthly":3900${income ? ',"incomeEquivalent":85000' : ""}}`;
    try {
      const res  = await fetch(API_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] }) });
      const data = await res.json();
      const text = data.content.map(i => i.text || "").join("");
      setResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
    } catch { setCompError("Unable to fetch data. Please try again."); }
    finally   { setLoading(false); }
  };

  const submitLead = async () => {
    if (!lead.firstName || !lead.email || lead.agentIndex === "") { setFormError("Please fill in your name, email, and select an agent."); return; }
    if (!lead.consent) { setFormError("Please agree to be contacted before submitting."); return; }
    setFormError(""); setSending(true);
    const agent = AGENTS[parseInt(lead.agentIndex)];
    try {
      await loadEmailJS();
      window.emailjs.init(EMAILJS_PUBLIC_KEY);
      await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_name:      agent.name,
        to_email:     agent.email,
        reply_to:     lead.email,
        subject:      `New Lead: ${lead.firstName} ${lead.lastName} — ${result.from.city} → ${result.to.city}`,
        message_html: buildEmailHTML(lead, agent, result),
        message:      `New lead for ${agent.name}\nClient: ${lead.firstName} ${lead.lastName}\nEmail: ${lead.email}\nPhone: ${lead.phone||"N/A"}\nMoving: ${result.from.city} → ${result.to.city}\nTimeline: ${lead.timeline||"N/A"}\nBeds: ${lead.bedrooms||"N/A"} | Baths: ${lead.bathrooms||"N/A"} | Garage: ${lead.garage||"N/A"}\nHVAC: ${lead.hvac||"N/A"} | Pool: ${lead.pool||"N/A"} | Basement: ${lead.basement||"N/A"}`,
      });
      setSubmitted(true);
    } catch(err) {
      console.error(err);
      setFormError("Email could not be sent. Please check your EmailJS configuration.");
    } finally { setSending(false); }
  };

  const pct = result ? Math.round(((result.totalToMonthly - result.totalFromMonthly) / result.totalFromMonthly) * 100) : 0;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#0d1b2a 0%,#1b2e40 55%,#0d1f2d 100%)", fontFamily:"Georgia,serif", color:"#f0ece0" }}>
      <div style={goldBar}/>
      <div style={{ maxWidth:"800px", margin:"0 auto", padding:"36px 20px 56px" }}>

        <div style={{ textAlign:"center", marginBottom:"36px" }}>
          <div style={{ display:"inline-block", background:"rgba(212,160,23,0.1)", border:"1px solid rgba(212,160,23,0.35)", borderRadius:"3px", padding:"5px 16px", marginBottom:"12px" }}>
            <span style={{ color:gold, fontSize:"10px", letterSpacing:"3px", textTransform:"uppercase", fontFamily:"sans-serif" }}>Real Estate Intelligence</span>
          </div>
          <h1 style={{ fontSize:"clamp(24px,5vw,40px)", fontWeight:400, color:"#f0ece0", margin:"0 0 10px", lineHeight:1.2 }}>
            Cost of Living<br/><em style={{ color:gold }}>Comparison Tool</em>
          </h1>
          <p style={{ color:"#7a93a8", fontSize:"14px", fontFamily:"sans-serif", lineHeight:1.6, margin:0 }}>
            See exactly how your budget changes when you move.<br/>Enter ZIP codes for an instant breakdown.
          </p>
        </div>

        <div style={card}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 44px 1fr", gap:"10px", alignItems:"end", marginBottom:"14px" }}>
            <div>
              <label style={lbl}>Current ZIP Code</label>
              <input style={{...inp, fontSize:"18px", letterSpacing:"2px", fontFamily:"Georgia,serif"}} type="text" maxLength={5} value={fromZip} onChange={e=>setFromZip(e.target.value.replace(/\D/g,""))} placeholder="90210"/>
            </div>
            <div style={{ display:"flex", justifyContent:"center", paddingBottom:"7px" }}>
              <div style={{ width:"32px", height:"32px", borderRadius:"50%", background:"rgba(212,160,23,0.1)", border:"1px solid rgba(212,160,23,0.28)", display:"flex", alignItems:"center", justifyContent:"center", color:gold }}>→</div>
            </div>
            <div>
              <label style={lbl}>Destination ZIP Code</label>
              <input style={{...inp, fontSize:"18px", letterSpacing:"2px", fontFamily:"Georgia,serif"}} type="text" maxLength={5} value={toZip} onChange={e=>setToZip(e.target.value.replace(/\D/g,""))} placeholder="30301"/>
            </div>
          </div>
          <div style={{ marginBottom:"18px" }}>
            <label style={lbl}>Annual Household Income <span style={{ color:"#3a4f5e", textTransform:"none", letterSpacing:0 }}>(optional)</span></label>
            <input style={inp} type="number" value={income} onChange={e=>setIncome(e.target.value)} placeholder="85000"/>
          </div>
          {compError && <div style={{ background:"rgba(220,60,60,0.08)", border:"1px solid rgba(220,60,60,0.25)", borderRadius:"7px", padding:"9px 13px", color:"#ff7a7a", fontSize:"12px", fontFamily:"sans-serif", marginBottom:"12px" }}>{compError}</div>}
          <button onClick={fetchComparison} disabled={loading} style={{ width:"100%", padding:"15px", background:loading?"rgba(212,160,23,0.2)":"linear-gradient(135deg,#d4a017,#a07810)", border:"none", borderRadius:"9px", color:loading?"#5a4810":"#0d1b2a", fontSize:"13px", fontWeight:700, fontFamily:"sans-serif", letterSpacing:"1.5px", cursor:loading?"not-allowed":"pointer", textTransform:"uppercase" }}>
            {loading ? "⏳  Analyzing…" : "Compare Cost of Living  →"}
          </button>
        </div>

        {loading && (
          <div style={{ textAlign:"center", padding:"24px" }}>
            <div style={{ display:"inline-block", width:"38px", height:"38px", border:"3px solid rgba(212,160,23,0.12)", borderTop:`3px solid ${gold}`, borderRadius:"50%", animation:"spin 0.9s linear infinite" }}/>
            <p style={{ color:"#7a93a8", fontFamily:"sans-serif", fontSize:"12px", marginTop:"10px" }}>Fetching cost of living data…</p>
          </div>
        )}

        {result && (
          <div style={{ animation:"up 0.5s ease-out" }}>

            <div style={{ background:pct>0?"rgba(200,60,60,0.08)":"rgba(40,180,80,0.08)", border:`1px solid ${pct>0?"rgba(200,60,60,0.22)":"rgba(40,180,80,0.22)"}`, borderRadius:"14px", padding:"26px", textAlign:"center", marginBottom:"14px" }}>
              <div style={{ color:"#7a93a8", fontFamily:"sans-serif", fontSize:"11px", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:"8px" }}>{result.from.city}, {result.from.state}  →  {result.to.city}, {result.to.state}</div>
              <div style={{ fontSize:"clamp(46px,9vw,68px)", fontWeight:300, color:pct>0?"#ff6b6b":"#4ade80", lineHeight:1, marginBottom:"6px" }}>{pct>0?"+":""}{pct}%</div>
              <div style={{ color:"#c0b48a", fontFamily:"sans-serif", fontSize:"13px", marginBottom:"4px" }}>{pct>0?"higher":"lower"} overall cost of living</div>
              <div style={{ color:"#7a93a8", fontFamily:"sans-serif", fontSize:"11px" }}>${result.totalFromMonthly.toLocaleString()}/mo → ${result.totalToMonthly.toLocaleString()}/mo · Δ ${Math.abs(result.totalToMonthly-result.totalFromMonthly).toLocaleString()}/mo</div>
            </div>

            {result.incomeEquivalent && (
              <div style={{ background:"rgba(212,160,23,0.06)", border:"1px solid rgba(212,160,23,0.18)", borderRadius:"11px", padding:"14px 18px", marginBottom:"14px", display:"flex", gap:"12px", alignItems:"center" }}>
                <span style={{ fontSize:"20px", flexShrink:0 }}>💡</span>
                <div>
                  <div style={{ color:gold, fontFamily:"sans-serif", fontSize:"9px", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"3px" }}>Purchasing Power</div>
                  <div style={{ color:"#b8a878", fontFamily:"sans-serif", fontSize:"12px", lineHeight:1.6 }}>Your <strong style={{ color:"#f0ece0" }}>${parseInt(income).toLocaleString()}/yr</strong> in {result.from.city} equals <strong style={{ color:gold }}>${result.incomeEquivalent.toLocaleString()}/yr</strong> in {result.to.city}.</div>
                </div>
              </div>
            )}

            <div style={{...card, marginBottom:"14px"}}>
              <div style={{...secHead, marginBottom:"16px"}}>Category Breakdown</div>
              {CATEGORIES.map(cat => {
                const d = result.categories[cat.key]; if (!d) return null;
                const cp = Math.round(((d.toMonthly-d.fromMonthly)/d.fromMonthly)*100);
                const mx = Math.max(d.fromIndex, d.toIndex, 110);
                return (
                  <div key={cat.key} style={{ marginBottom:"13px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"5px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                        <span style={{ fontSize:"13px" }}>{cat.icon}</span>
                        <span style={{ color:"#b8a878", fontFamily:"sans-serif", fontSize:"12px" }}>{cat.label}</span>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:"6px", fontFamily:"sans-serif", fontSize:"11px" }}>
                        <span style={{ color:"#4a6070" }}>${d.fromMonthly}/mo</span>
                        <span style={{ color:"#2a3840" }}>→</span>
                        <span style={{ color:"#d0c898" }}>${d.toMonthly}/mo</span>
                        <span style={{ color:cp>0?"#ff6b6b":"#4ade80", fontWeight:700, minWidth:"38px", textAlign:"right" }}>{cp>0?"+":""}{cp}%</span>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:"3px", height:"4px" }}>
                      <div style={{ height:"4px", borderRadius:"2px", background:"rgba(122,147,168,0.28)", width:`${(d.fromIndex/mx)*100}%` }}/>
                      <div style={{ height:"4px", borderRadius:"2px", background:cp>0?"rgba(255,107,107,0.55)":"rgba(74,222,128,0.55)", width:`${(d.toIndex/mx)*100}%` }}/>
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{...card, marginBottom:"14px"}}>
              <div style={secHead}>Summary</div>
              <p style={{ color:"#b8a878", fontFamily:"sans-serif", fontSize:"13px", lineHeight:1.75, margin:0 }}>{result.summary}</p>
            </div>

            {!showForm && !submitted && (
              <div style={{ background:"linear-gradient(135deg,rgba(212,160,23,0.1),rgba(212,160,23,0.03))", border:"1px solid rgba(212,160,23,0.22)", borderRadius:"14px", padding:"26px", textAlign:"center", marginBottom:"14px" }}>
                <div style={{ fontSize:"24px", marginBottom:"8px" }}>🏡</div>
                <h3 style={{ color:"#f0ece0", fontFamily:"Georgia,serif", fontSize:"17px", fontWeight:400, margin:"0 0 7px" }}>Ready to make your move to {result.to.city}?</h3>
                <p style={{ color:"#7a93a8", fontFamily:"sans-serif", fontSize:"12px", lineHeight:1.6, margin:"0 0 18px" }}>Connect with one of our relocation specialists — they'll match you with homes that fit your new budget.</p>
                <button onClick={() => setShowForm(true)} style={{ padding:"13px 30px", background:`linear-gradient(135deg,${gold},#a07810)`, border:"none", borderRadius:"8px", color:"#0d1b2a", fontWeight:700, fontFamily:"sans-serif", fontSize:"12px", cursor:"pointer" }}>
                  Connect with an Agent  →
                </button>
              </div>
            )}

            {showForm && !submitted && (
              <div style={{...card, border:"1px solid rgba(212,160,23,0.2)", animation:"up 0.4s ease-out"}}>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"20px" }}>
                  <span style={{ fontSize:"18px" }}>✉️</span>
                  <div>
                    <div style={{ color:gold, fontFamily:"sans-serif", fontSize:"9px", letterSpacing:"2px", textTransform:"uppercase", marginBottom:"2px" }}>Contact an Agent</div>
                    <div style={{ color:"#f0ece0", fontFamily:"Georgia,serif", fontSize:"15px" }}>Tell us about your move & dream home</div>
                  </div>
                </div>

                <div style={secHead}>Your Contact Information</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"10px" }}>
                  <div><label style={lbl}>First Name *</label><input style={inp} type="text" value={lead.firstName} onChange={e=>setL("firstName",e.target.value)} placeholder="Jane"/></div>
                  <div><label style={lbl}>Last Name</label><input style={inp} type="text" value={lead.lastName} onChange={e=>setL("lastName",e.target.value)} placeholder="Smith"/></div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"10px" }}>
                  <div><label style={lbl}>Email *</label><input style={inp} type="email" value={lead.email} onChange={e=>setL("email",e.target.value)} placeholder="jane@email.com"/></div>
                  <div><label style={lbl}>Phone</label><input style={inp} type="tel" value={lead.phone} onChange={e=>setL("phone",e.target.value)} placeholder="(555) 000-0000"/></div>
                </div>
                <div style={{ marginBottom:"18px" }}>
                  <label style={lbl}>Preferred Contact Method</label>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                    {CONTACT_PREFS.map(o => <Pill key={o} label={o} active={lead.contactPref===o} onClick={()=>setL("contactPref", lead.contactPref===o?"":o)}/>)}
                  </div>
                </div>

                <div style={secHead}>Select Your Agent</div>
                <div style={{ marginBottom:"18px" }}>
                  <select style={{...inp, appearance:"none"}} value={lead.agentIndex} onChange={e=>setL("agentIndex",e.target.value)}>
                    <option value="">— Choose an agent —</option>
                    {AGENTS.map((a,i) => <option key={i} value={i}>{a.name} — {a.title}</option>)}
                  </select>
                  {lead.agentIndex !== "" && (
                    <div style={{ marginTop:"8px", background:"rgba(212,160,23,0.05)", border:"1px solid rgba(212,160,23,0.15)", borderRadius:"7px", padding:"8px 12px", display:"flex", gap:"16px", fontFamily:"sans-serif", fontSize:"11px", color:"#7a93a8" }}>
                      <span>📧 {AGENTS[lead.agentIndex].email}</span>
                      <span>📞 {AGENTS[lead.agentIndex].phone}</span>
                    </div>
                  )}
                </div>

                <div style={secHead}>Move Details</div>
                <div style={{ marginBottom:"10px" }}>
                  <label style={lbl}>When are you looking to move?</label>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                    {TIMELINE_OPTIONS.map(o => <Pill key={o} label={o} active={lead.timeline===o} onClick={()=>setL("timeline", lead.timeline===o?"":o)}/>)}
                  </div>
                </div>
                <div style={{ marginBottom:"10px" }}>
                  <label style={lbl}>Buyer profile</label>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                    {BUYER_STATUS.map(o => <Pill key={o} label={o} active={lead.buyerStatus===o} onClick={()=>setL("buyerStatus", lead.buyerStatus===o?"":o)}/>)}
                  </div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"18px" }}>
                  <div>
                    <label style={lbl}>Pre-approved?</label>
                    <Sel value={lead.preApproved} onChange={v=>setL("preApproved",v)} options={["Yes, pre-approved","No, but I plan to","Cash buyer","Not sure yet"]}/>
                  </div>
                  <div>
                    <label style={lbl}>Price range</label>
                    <Sel value={lead.priceRange} onChange={v=>setL("priceRange",v)} options={["Under $200k","$200k–$400k","$400k–$600k","$600k–$900k","$900k–$1.5M","$1.5M+"]}/>
                  </div>
                </div>

                <div style={secHead}>Home Preferences</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"10px", marginBottom:"10px" }}>
                  <div><label style={lbl}>Bedrooms</label><Sel value={lead.bedrooms} onChange={v=>setL("bedrooms",v)} options={["1","2","3","4","5","5+"]} placeholder="Any"/></div>
                  <div><label style={lbl}>Bathrooms</label><Sel value={lead.bathrooms} onChange={v=>setL("bathrooms",v)} options={["1","1.5","2","2.5","3","3+"]} placeholder="Any"/></div>
                  <div><label style={lbl}>Garage</label><Sel value={lead.garage} onChange={v=>setL("garage",v)} options={["No garage","1-car","2-car","3-car","No preference"]} placeholder="Any"/></div>
                </div>
                <div style={{ marginBottom:"10px" }}>
                  <label style={lbl}>HVAC / Heating Type</label>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                    {HVAC_OPTIONS.map(o => <Pill key={o} label={o} active={lead.hvac===o} onClick={()=>setL("hvac", lead.hvac===o?"":o)}/>)}
                  </div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"18px" }}>
                  <div><label style={lbl}>Pool</label><Sel value={lead.pool} onChange={v=>setL("pool",v)} options={["Required","Would love one","Not needed","No preference"]} placeholder="Any"/></div>
                  <div><label style={lbl}>Basement</label><Sel value={lead.basement} onChange={v=>setL("basement",v)} options={["Required","Preferred","Not needed","No preference"]} placeholder="Any"/></div>
                </div>

                <div style={{ marginBottom:"18px" }}>
                  <label style={lbl}>Additional Notes</label>
                  <textarea style={{...inp, minHeight:"60px", resize:"vertical", lineHeight:1.6}} value={lead.notes} onChange={e=>setL("notes",e.target.value)} placeholder="Must-haves, deal-breakers, questions for your agent…"/>
                </div>

                <div style={{ marginBottom:"18px", display:"flex", gap:"11px", alignItems:"flex-start", background:"rgba(255,255,255,0.02)", borderRadius:"8px", padding:"12px 14px" }}>
                  <input type="checkbox" id="consent" checked={lead.consent} onChange={e=>setL("consent",e.target.checked)} style={{ marginTop:"2px", accentColor:gold, width:"14px", height:"14px", flexShrink:0, cursor:"pointer" }}/>
                  <label htmlFor="consent" style={{ color:"#7a93a8", fontFamily:"sans-serif", fontSize:"10px", lineHeight:1.65, cursor:"pointer" }}>
                    I agree to be contacted by the selected agent regarding my real estate inquiry. My information will be used solely to assist with my home search and will not be sold to third parties. I may opt out at any time.
                  </label>
                </div>

                {formError && <div style={{ background:"rgba(220,60,60,0.08)", border:"1px solid rgba(220,60,60,0.25)", borderRadius:"7px", padding:"9px 13px", color:"#ff7a7a", fontSize:"11px", fontFamily:"sans-serif", marginBottom:"12px" }}>{formError}</div>}

                <div style={{ display:"flex", gap:"10px" }}>
                  <button onClick={submitLead} disabled={sending} style={{ flex:1, padding:"14px", background:sending?"rgba(212,160,23,0.2)":`linear-gradient(135deg,${gold},#a07810)`, border:"none", borderRadius:"8px", color:sending?"#5a4810":"#0d1b2a", fontWeight:700, fontFamily:"sans-serif", fontSize:"12px", letterSpacing:"1px", cursor:sending?"not-allowed":"pointer", textTransform:"uppercase" }}>
                    {sending ? "⏳  Sending…" : "Send My Inquiry  →"}
                  </button>
                  <button onClick={() => setShowForm(false)} style={{ padding:"14px 16px", background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"8px", color:"#7a93a8", fontFamily:"sans-serif", fontSize:"12px", cursor:"pointer" }}>Cancel</button>
                </div>
              </div>
            )}

            {submitted && (
              <div style={{ background:"rgba(40,180,80,0.07)", border:"1px solid rgba(40,180,80,0.22)", borderRadius:"14px", padding:"28px", textAlign:"center", animation:"up 0.4s ease-out" }}>
                <div style={{ fontSize:"36px", marginBottom:"10px" }}>✅</div>
                <h3 style={{ color:"#4ade80", fontFamily:"Georgia,serif", fontSize:"18px", fontWeight:400, margin:"0 0 8px" }}>You're all set!</h3>
                <p style={{ color:"#b8a878", fontFamily:"sans-serif", fontSize:"13px", lineHeight:1.7, margin:"0 0 5px" }}>
                  <strong style={{ color:"#f0ece0" }}>{AGENTS[parseInt(lead.agentIndex)].name}</strong> has been notified and will reach out to <strong style={{ color:"#f0ece0" }}>{lead.email}</strong> shortly.
                </p>
                <p style={{ color:"#7a93a8", fontFamily:"sans-serif", fontSize:"12px", margin:0 }}>Feel free to run another comparison while you wait.</p>
              </div>
            )}

            <p style={{ color:"#4a6070" fontFamily:"sans-serif", fontSize:"10px", textAlign:"center", marginTop:"14px", lineHeight:1.6 }}>
              * " Cost estimates based on general indices. Individual expenses vary. Not financial advice. Powered by Claude (Anthropic)."
            </p>
          </div>
        )}
      </div>
      <div style={goldBar}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
